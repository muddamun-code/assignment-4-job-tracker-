<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

<!-- TITLE -->
<h1 class="text-3xl font-bold text-blue-900 mb-6">
Job Application Tracker
</h1>


<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

<div class="bg-white p-5 rounded-lg shadow-sm">
<p class="text-gray-500">Total</p>
<p id="totalCount" class="text-2xl font-bold text-blue-900">0</p>
</div>

<div class="bg-white p-5 rounded-lg shadow-sm">
<p class="text-gray-500">Interview</p>
<p id="interviewCount" class="text-2xl font-bold text-green-600">0</p>
</div>

<div class="bg-white p-5 rounded-lg shadow-sm">
<p class="text-gray-500">Rejected</p>
<p id="rejectedCount" class="text-2xl font-bold text-red-600">0</p>
</div>

</div>


<hr class="mb-6">




</div>

<script src="script.js"></script>

</body>
</html>
